<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRestaurant - S3 Media Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .login-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .login-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .login-form input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .login-form button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .login-form button:hover {
            background: #5568d3;
        }

        .user-info {
            background: #e8f5e9;
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-left: 10px;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .image-card {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .image-info {
            padding: 15px;
        }

        .image-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .image-size {
            font-size: 12px;
            color: #666;
        }

        .documents-list {
            margin-top: 20px;
        }

        .document-item {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .document-item:hover {
            background: #e9ecef;
        }

        .document-info {
            flex: 1;
        }

        .document-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .document-meta {
            font-size: 12px;
            color: #666;
        }

        .download-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .download-btn:hover {
            background: #218838;
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🍽️ XRestaurant - S3 Media Viewer</h1>
            <p class="subtitle">View images and documents from AWS S3 buckets</p>
        </div>

        <!-- Login Section -->
        <div class="login-section">
            <div class="login-form" id="loginForm">
                <input type="text" id="username" placeholder="Username (user1 or user2)" />
                <input type="password" id="password" placeholder="Password" />
                <button onclick="login()">Login</button>
                <span id="userInfo" class="user-info" style="display: none;"></span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-number" id="imageCount">0</div>
                <div class="stat-label">Images</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="documentCount">0</div>
                <div class="stat-label">Documents</div>
            </div>
        </div>

        <!-- Images Section -->
        <div class="section">
            <h2 class="section-title">📸 Images (xrestaurant-media)</h2>
            <div id="imagesContainer" class="loading">Please login to view images...</div>
        </div>

        <!-- Documents Section -->
        <div class="section">
            <h2 class="section-title">📄 Documents (xrestaurant-documents)</h2>
            <div id="documentsContainer" class="loading">Please login to view documents...</div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'http://xrestaurant-alb-29066241.ap-southeast-1.elb.amazonaws.com'; // Change this to your ALB DNS
        let currentUser = null;
        let currentPassword = null;

        // Login function
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }

            try {
                // Test authentication with /api/me endpoint
                const response = await fetch(`${API_BASE_URL}/api/me`, {
                    headers: {
                        'x-username': username,
                        'x-password': password
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentUser = username;
                    currentPassword = password;

                    // Update UI
                    document.getElementById('userInfo').style.display = 'inline-block';
                    document.getElementById('userInfo').innerHTML = `
                        ✅ Logged in as <strong>${data.user}</strong> (${data.role})
                    `;
                    document.getElementById('stats').style.display = 'flex';

                    // Load data
                    loadImages();
                    loadDocuments();
                } else {
                    const error = await response.json();
                    alert(`Login failed: ${error.message}`);
                }
            } catch (error) {
                alert(`Login error: ${error.message}`);
            }
        }

        // Load images
        async function loadImages() {
            const container = document.getElementById('imagesContainer');
            container.innerHTML = '<div class="loading">Loading images...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/s3/images`, {
                    headers: {
                        'x-username': currentUser,
                        'x-password': currentPassword
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load images');
                }

                const data = await response.json();
                
                // Update stats
                document.getElementById('imageCount').textContent = data.count;

                if (data.images.length === 0) {
                    container.innerHTML = '<div class="empty">No images found in bucket</div>';
                    return;
                }

                // Display images
                container.innerHTML = '';
                const grid = document.createElement('div');
                grid.className = 'images-grid';

                data.images.forEach(image => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="${image.url}" alt="${image.key}" onerror="this.src='https://via.placeholder.com/250x200?text=Image+Not+Found'" />
                        <div class="image-info">
                            <div class="image-name">${image.key}</div>
                            <div class="image-size">${formatBytes(image.size)}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(grid);
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading images: ${error.message}</div>`;
            }
        }

        // Load documents
        async function loadDocuments() {
            const container = document.getElementById('documentsContainer');
            container.innerHTML = '<div class="loading">Loading documents...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/s3/documents`, {
                    headers: {
                        'x-username': currentUser,
                        'x-password': currentPassword
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load documents');
                }

                const data = await response.json();
                
                // Update stats
                document.getElementById('documentCount').textContent = data.count;

                if (data.documents.length === 0) {
                    container.innerHTML = '<div class="empty">No documents found in bucket</div>';
                    return;
                }

                // Display documents
                container.innerHTML = '';
                const list = document.createElement('div');
                list.className = 'documents-list';

                data.documents.forEach(doc => {
                    const item = document.createElement('div');
                    item.className = 'document-item';
                    item.innerHTML = `
                        <div class="document-info">
                            <div class="document-name">📄 ${doc.filename}</div>
                            <div class="document-meta">
                                Size: ${formatBytes(doc.size)} | 
                                Modified: ${new Date(doc.lastModified).toLocaleString()}
                            </div>
                        </div>
                        <button class="download-btn" onclick="downloadDocument('${doc.key}', '${doc.filename}')">
                            Download
                        </button>
                    `;
                    list.appendChild(item);
                });

                container.appendChild(list);
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading documents: ${error.message}</div>`;
            }
        }

        // Download document
        async function downloadDocument(key, filename) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/s3/documents/${encodeURIComponent(key)}/download`, {
                    headers: {
                        'x-username': currentUser,
                        'x-password': currentPassword
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to get download URL');
                }

                const data = await response.json();
                
                // Open signed URL in new tab
                window.open(data.signedUrl, '_blank');
            } catch (error) {
                alert(`Download error: ${error.message}`);
            }
        }

        // Format bytes
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Enter key to login
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
